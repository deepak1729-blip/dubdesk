<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DubDesk — Subtitle Translator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="close-settings">&times;</button>
      </div>
      <div class="modal-body">
        <label for="api-key-input">OpenAI API Key</label>
        <input type="password" id="api-key-input" placeholder="sk-...">
        <p class="hint">Your API key is stored locally in your browser and never sent anywhere other than OpenAI's API.</p>
      </div>
      <div class="modal-footer">
        <button id="save-api-key" class="btn btn-primary">Save</button>
        <button id="cancel-settings" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Top Header Bar -->
  <header class="header">
    <div class="header-left">
      <div class="logo">dubdesk</div>
      <div class="header-divider"></div>
      <button id="translate-btn" class="btn btn-accent" disabled>Translate</button>
      <button id="verify-90-btn" class="btn btn-header-ghost" disabled>Selected Cell 90%</button>
      <button id="verify-100-btn" class="btn btn-header-ghost" disabled>Selected Cell 100%</button>
    </div>
    <div class="header-right">
      <div class="youtube-url-wrapper">
        <span class="url-icon">▶</span>
        <input type="text" id="youtube-url" placeholder="Paste YouTube URL and press Enter...">
      </div>
      <input type="file" id="srt-file-input" accept=".srt" hidden>
      <button id="upload-btn" class="btn btn-header-outline">Upload SRT</button>
      <input type="file" id="hinglish-srt-file-input" accept=".srt" hidden>
      <button id="upload-hinglish-btn" class="btn btn-header-outline hidden">Upload Hinglish SRT</button>
      <button id="settings-btn" class="btn btn-icon" title="Settings">⚙</button>
    </div>
  </header>

  <!-- Sub-header Bar -->
  <div class="sub-header">
    <div class="sub-header-left">
      <span class="progress-indicator" id="progress-indicator">0 / 0 captions recorded</span>
      <div class="verify-progress" id="verify-progress">
        <div class="verify-progress-100" id="verify-progress-100"></div>
        <div class="verify-progress-90" id="verify-progress-90"></div>
      </div>
      <div class="translate-progress hidden" id="translate-progress">
        <div class="translate-progress-bar" id="translate-progress-bar"></div>
      </div>
    </div>
    <div class="sub-header-right">
      <div class="pace-wrapper" title="Slow down recording pace — audio is sped up to match caption duration">
        <label class="pace-label" for="pace-slider">Pace</label>
        <input type="range" id="pace-slider" class="pace-slider" min="30" max="100" value="100" step="5">
        <span id="pace-value" class="pace-value">1.0x</span>
      </div>
      <div class="mic-wrapper" title="Select microphone">
        <span class="mic-icon">🎤</span>
        <select id="mic-select" class="mic-select"></select>
      </div>
      <button id="record-all-btn" class="btn btn-record" disabled>● Rec Continuously</button>
      <button id="stop-recording-btn" class="btn btn-stop hidden">◼ Stop</button>
      <button id="download-all-audio-btn" class="btn btn-sub-ghost" title="Stitch all recorded audio into one file and download">⬇ All Audio</button>
      <button id="save-draft-btn" class="btn btn-sub-ghost">Save Draft</button>
      <button id="submit-btn" class="btn btn-success">Download</button>
    </div>
  </div>

  <!-- Main Content Area -->
  <main class="main-content">

    <!-- Left Column: Caption Table -->
    <div class="caption-panel">
      <div class="caption-panel-header">
        <h2 id="video-title" class="video-title">Untitled</h2>
        <div class="table-col-headers">
          <div class="th th-check">#</div>
          <div class="th th-a">A — English (source)</div>
          <div class="th th-b">B — Hinglish</div>
          <div class="th th-time">Utility</div>
        </div>
      </div>
      <div id="caption-table" class="caption-table">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">🎬</div>
          <p>Upload an SRT file to get started</p>
          <button id="upload-btn-empty" class="btn btn-primary">Upload SRT File</button>
        </div>
      </div>
    </div>

    <!-- Right Column: YouTube Player -->
    <div class="player-panel">
      <div class="player-panel-inner">
        <div id="player-placeholder" class="player-placeholder">
          <div class="placeholder-icon">▶</div>
          <p>Paste a YouTube URL above<br>to load the video</p>
        </div>
        <div id="youtube-iframe-wrapper" class="youtube-iframe-wrapper hidden"></div>
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Flow teleprompter — shown during continuous recording -->
  <div id="flow-teleprompter" class="flow-tp hidden" aria-hidden="true">
    <div class="flow-tp-content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
